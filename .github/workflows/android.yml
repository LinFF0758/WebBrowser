name: Android CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "temurin"

      - name: Setup Android SDK
        run: |
          ANDROID_SDK_PATH="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-/usr/local/lib/android/sdk}}"
          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_PATH}" >> $GITHUB_ENV
          echo "ANDROID_HOME=${ANDROID_SDK_PATH}" >> $GITHUB_ENV
          echo "sdk.dir=${ANDROID_SDK_PATH}" > WebBrowserApp/local.properties
          yes | ${ANDROID_SDK_PATH}/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
          ${ANDROID_SDK_PATH}/cmdline-tools/latest/bin/sdkmanager "platforms;android-35" "build-tools;35.0.0"

      - name: Grant gradlew execute permission
        run: chmod +x WebBrowserApp/gradlew

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build APK (debug)
        run: ./gradlew assembleDebug
        working-directory: WebBrowserApp

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: WebBrowserApp-debug
          path: WebBrowserApp/app/build/outputs/apk/debug/app-debug.apk
